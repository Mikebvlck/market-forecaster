<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartoffel AI | Neural War Room V2.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #030508;
            --surface: #0a0e14;
            --surface-light: #111827;
            --accent: #bc13fe;
            --accent-cyan: #00f2ff;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(188, 19, 254, 0.2);
            --glow: rgba(188, 19, 254, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            height: 64px;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .logo {
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            color: var(--accent);
            font-size: 1.4rem;
        }

        .logo span {
            color: var(--accent);
            font-weight: 400;
        }

        .control-hub {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .asset-selector {
            background: var(--surface-light);
            border: 1px solid var(--border);
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            outline: none;
        }

        .tf-btn-group {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 3px;
            border: 1px solid var(--border);
        }

        .tf-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            padding: 4px 10px;
            font-size: 0.65rem;
            font-weight: 800;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .tf-btn.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 10px var(--glow);
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 320px 1fr 300px;
            overflow: hidden;
        }

        /* --- Sidebar: AI COUNCIL --- */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .label-tiny {
            font-size: 0.6rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
            display: block;
        }

        .council-title {
            font-size: 1rem;
            font-weight: 800;
            color: var(--accent);
        }

        #council-feed {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .ai-msg {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            line-height: 1.4;
            animation: fadeIn 0.5s ease-out;
        }

        .ai-name {
            font-weight: 800;
            font-size: 0.65rem;
            text-transform: uppercase;
            margin-bottom: 6px;
            display: block;
        }

        .ai-trend {
            color: var(--accent);
        }

        .ai-liquidity {
            color: var(--accent-cyan);
        }

        .ai-risk {
            color: #ff4d4d;
        }

        .scout-hub {
            padding: 20px;
            border-top: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
        }

        .scout-item {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .scout-item i {
            color: var(--accent-cyan);
            font-size: 0.6rem;
        }

        /* --- Main: ANALYSIS MAP --- */
        .map-section {
            position: relative;
            background: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .map-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #tv-widget-container {
            flex: 1;
        }

        .map-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 14, 20, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 10px 24px;
            display: flex;
            gap: 20px;
            z-index: 20;
            align-items: center;
        }

        .map-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .map-btn:hover {
            color: var(--accent-cyan);
        }

        .map-btn.active {
            color: var(--accent-cyan);
            text-shadow: 0 0 10px var(--accent-cyan);
        }

        /* --- Right: THE $1M PATH --- */
        .path-section {
            background: var(--surface);
            border-left: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .compounding-card {
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .goal-label {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--accent-cyan);
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .goal-amount {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, var(--accent), var(--accent-cyan));
            width: 0.5%;
            transition: width 1s;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 0.7rem;
        }

        .history-table th {
            text-align: left;
            color: var(--text-dim);
            padding-bottom: 8px;
            font-weight: 400;
        }

        .history-table td {
            padding: 8px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }

        .status-win {
            color: var(--accent-cyan);
        }

        .btn-launch {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 16px;
            color: #fff;
            font-weight: 800;
            font-size: 0.8rem;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(188, 19, 254, 0.2);
            transition: 0.3s;
        }

        .btn-launch:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px var(--glow);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- SVG STYLES --- */
        .layer {
            display: none;
        }

        .layer.active {
            display: block;
        }

        .neural-zone {
            fill: rgba(188, 19, 254, 0.1);
            stroke: var(--accent);
            stroke-width: 1;
            stroke-dasharray: 4;
        }

        .sniper-entry {
            fill: rgba(0, 242, 255, 0.2);
            stroke: var(--accent-cyan);
            stroke-width: 2;
        }

        .liquidity-gap {
            fill: rgba(0, 242, 255, 0.05);
            stroke: var(--accent-cyan);
            stroke-width: 1;
            stroke-dasharray: 2;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo"><i class="fas fa-microchip"></i> KARTOFFEL <span>V2.1</span></div>
        <div class="control-hub">
            <select class="asset-selector" id="asset-switcher">
                <option value="BINANCE:XAUUSDT">GOLD (XAU/USD)</option>
                <option value="BINANCE:BTCUSDT" selected>BITCOIN (BTC/USD)</option>
                <option value="BINANCE:EURUSDT">EUR/USD</option>
                <option value="BINANCE:GBPUSDT">GBP/USD</option>
            </select>
            <div class="tf-btn-group">
                <button class="tf-btn" onclick="setTF('15')">15M</button>
                <button class="tf-btn" onclick="setTF('60')">1H</button>
                <button class="tf-btn active" onclick="setTF('240')">4H</button>
            </div>
            <a href="index.html" class="nav-btn" style="margin-left: 20px;">V1 Hub</a>
        </div>
        <div style="font-size: 0.75rem; color: var(--accent-cyan); font-weight: 700;">
            <i class="fas fa-circle pulse" style="font-size: 0.5rem; margin-right: 6px;"></i> NEURAL SYNC
        </div>
    </header>

    <main>
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="label-tiny">Real-Time Brainstorm</span>
                <div class="council-title">AI Council Hub</div>
            </div>
            <div id="council-feed"></div>
            <div class="scout-hub">
                <span class="label-tiny">Strategy Scout (WWW)</span>
                <div id="scout-list"></div>
            </div>
        </aside>

        <section class="map-section">
            <svg class="map-overlay" id="neural-overlay" viewBox="0 0 800 600" preserveAspectRatio="none">
                <!-- Zones Layer -->
                <g id="layer-zones" class="layer">
                    <rect x="100" y="120" width="600" height="40" class="neural-zone" />
                    <rect x="100" y="440" width="600" height="40" class="neural-zone" />
                </g>
                <!-- Sniper Layer -->
                <g id="layer-sniper" class="layer">
                    <circle cx="400" cy="460" r="15" class="sniper-entry" />
                    <line x1="400" y1="460" x2="450" y2="460" stroke="#00f2ff" stroke-width="2" />
                </g>
                <!-- Liquidity Layer -->
                <g id="layer-gaps" class="layer">
                    <rect x="100" y="280" width="600" height="20" class="liquidity-gap" />
                    <rect x="100" y="320" width="600" height="20" class="liquidity-gap" />
                </g>
            </svg>
            <div id="tv-widget-container"></div>

            <div class="map-controls">
                <button class="map-btn" id="btn-zones" onclick="toggleLayer('zones')"><i
                        class="fas fa-draw-polygon"></i> Neural Zones</button>
                <button class="map-btn" id="btn-sniper" onclick="toggleLayer('sniper')"><i
                        class="fas fa-crosshairs"></i> Sniper Entry</button>
                <button class="map-btn" id="btn-gaps" onclick="toggleLayer('gaps')"><i class="fas fa-ghost"></i>
                    Liquidity Gaps</button>
            </div>
        </section>

        <aside class="path-section">
            <div class="compounding-card">
                <div class="goal-label">Growth to $1M</div>
                <div class="goal-amount" id="balance-display">$10,000.00</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>

            <div class="stat-grid">
                <div class="stat-item">
                    <div class="label-tiny">Next Lot Size</div>
                    <div class="stat-val" id="next-lot">0.10</div>
                </div>
                <div class="stat-item">
                    <div class="label-tiny">Ref. Price</div>
                    <div class="stat-val" id="sync-price">0.00</div>
                </div>
            </div>

            <div class="compounding-card">
                <span class="label-tiny">Performance History</span>
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>ASSET</th>
                            <th>RESULT</th>
                            <th>GAIN</th>
                        </tr>
                    </thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>

            <div style="flex: 1;"></div>
            <button class="btn-launch" onclick="launchSimulation()">ACTIVATE GROWTH CODE</button>
        </aside>
    </main>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const state = { symbol: 'BINANCE:BTCUSDT', interval: '240', price: 0 };
        const layers = { zones: false, sniper: false, gaps: false };

        function initTV() {
            new TradingView.widget({
                "autosize": true, "symbol": state.symbol, "interval": state.interval,
                "theme": "dark", "style": "1", "container_id": "tv-widget-container",
                "library_path": "https://s3.tradingview.com/tv.js"
            });
        }

        document.getElementById('asset-switcher').addEventListener('change', (e) => {
            state.symbol = e.target.value;
            initTV();
            syncPrice();
        });

        function setTF(tf) {
            state.interval = tf;
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            initTV();
        }

        async function syncPrice() {
            const sym = state.symbol.split(':')[1];
            try {
                const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${sym}`);
                const data = await res.json();
                state.price = parseFloat(data.price);
                document.getElementById('sync-price').innerText = state.price.toLocaleString();
            } catch (e) { }
        }

        function toggleLayer(layer) {
            layers[layer] = !layers[layer];
            document.getElementById(`layer-${layer}`).classList.toggle('active', layers[layer]);
            document.getElementById(`btn-${layer}`).classList.toggle('active', layers[layer]);
        }

        const council = document.getElementById('council-feed');
        const agents = [
            { name: 'Trend Voyager', class: 'ai-trend', icon: 'fa-compass' },
            { name: 'Liquidity Scout', class: 'ai-liquidity', icon: 'fa-water' },
            { name: 'Risk Warden', class: 'ai-risk', icon: 'fa-shield-halved' }
        ];

        function addCouncilMsg() {
            const agent = agents[Math.floor(Math.random() * agents.length)];
            const sym = state.symbol.split(':')[1];
            const messages = [
                `Analyzing ${sym} structure. Current price of ${state.price} is testing liquidity.`,
                `Major gap detected on the ${state.interval}m chart. Price likely to fill.`,
                `Whales are stacking orders for ${sym}. Institutional bias is BULLISH.`,
                `Risk-to-Reward on ${sym} optimized. Sniper entry confirmed near ${state.price}.`,
                `SMC concepts suggest a fake-out on ${sym}. Waiting for structural break.`,
                `Liquidity Scout reporting: Massive liquidations pending at the current range.`
            ];
            const div = document.createElement('div');
            div.className = 'ai-msg';
            div.innerHTML = `<span class="ai-name ${agent.class}"><i class="fas ${agent.icon}"></i> ${agent.name}</span>${messages[Math.floor(Math.random() * messages.length)]}`;
            council.prepend(div);
            if (council.children.length > 10) council.removeChild(council.lastChild);
        }

        let balance = 10000;
        function launchSimulation() {
            const interval = setInterval(() => {
                balance += Math.random() * 8000;
                document.getElementById('balance-display').innerText = "$" + balance.toLocaleString(undefined, { minimumFractionDigits: 2 });
                const progress = (balance / 1000000) * 100;
                document.getElementById('progress-fill').style.width = Math.min(progress, 100) + '%';
                document.getElementById('next-lot').innerText = (0.1 + (balance / 10000) * 0.1).toFixed(2);
                if (balance >= 1000000) clearInterval(interval);
            }, 50);
        }

        window.onload = () => {
            initTV();
            syncPrice();
            setInterval(addCouncilMsg, 4000);
            setInterval(syncPrice, 5000);
        };
    </script>
</body>

</html>
