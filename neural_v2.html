<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartoffel AI | Neural War Room V2.3</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #030508;
            --surface: #0a0e14;
            --surface-light: #111827;
            --accent: #bc13fe;
            --accent-cyan: #00f2ff;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(188, 19, 254, 0.2);
            --glow: rgba(188, 19, 254, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            height: 64px;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .logo {
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            color: var(--accent);
            font-size: 1.4rem;
        }

        .logo span {
            color: var(--accent);
            font-weight: 400;
        }

        .control-hub {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .asset-selector {
            background: var(--surface-light);
            border: 1px solid var(--border);
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            outline: none;
        }

        .tf-btn-group {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 3px;
            border: 1px solid var(--border);
        }

        .tf-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            padding: 4px 10px;
            font-size: 0.65rem;
            font-weight: 800;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .tf-btn.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 10px var(--glow);
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 320px 1fr 300px;
            overflow: hidden;
        }

        /* --- Sidebar: AI COUNCIL --- */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .label-tiny {
            font-size: 0.6rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
            display: block;
        }

        .council-title {
            font-size: 1rem;
            font-weight: 800;
            color: var(--accent);
        }

        #council-feed {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .ai-msg {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            line-height: 1.4;
            animation: fadeIn 0.5s ease-out;
        }

        .ai-name {
            font-weight: 800;
            font-size: 0.65rem;
            text-transform: uppercase;
            margin-bottom: 6px;
            display: block;
        }

        .ai-trend {
            color: var(--accent);
        }

        .ai-liquidity {
            color: var(--accent-cyan);
        }

        .ai-risk {
            color: #ff4d4d;
        }

        .scout-hub {
            padding: 20px;
            border-top: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
        }

        .scout-item {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .scout-item i {
            color: var(--accent-cyan);
            font-size: 0.6rem;
        }

        /* --- Main: ANALYSIS MAP --- */
        .map-section {
            position: relative;
            background: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .map-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #tv-widget-container {
            flex: 1;
        }

        .map-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 14, 20, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 10px 24px;
            display: flex;
            gap: 20px;
            z-index: 20;
            align-items: center;
        }

        .map-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .map-btn:hover {
            color: var(--accent-cyan);
        }

        .map-btn.active {
            color: var(--accent-cyan);
            text-shadow: 0 0 10px var(--accent-cyan);
        }

        /* --- Right: THE $1M PATH --- */
        .path-section {
            background: var(--surface);
            border-left: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .compounding-card {
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .goal-label {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--accent-cyan);
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .goal-amount {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, var(--accent), var(--accent-cyan));
            width: 0.5%;
            transition: width 1s;
        }

        /* --- Neural Intel Card --- */
        .intel-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 16px;
            margin-bottom: 10px;
            border-left: 4px solid var(--accent-cyan);
        }

        .levels-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 8px;
        }

        .level-item {
            text-align: center;
        }

        .level-label {
            font-size: 0.55rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .level-val {
            font-size: 0.8rem;
            font-weight: 800;
            margin-top: 4px;
        }

        .tp-val {
            color: var(--accent-cyan);
        }

        .sl-val {
            color: #ff4d4d;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .stat-val {
            font-size: 0.9rem;
            font-weight: 800;
            margin-top: 4px;
        }

        .btn-launch {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 16px;
            color: #fff;
            font-weight: 800;
            font-size: 0.8rem;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(188, 19, 254, 0.2);
            transition: 0.3s;
        }

        .btn-launch:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px var(--glow);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- SVG STYLES --- */
        .layer {
            opacity: 0;
            pointer-events: none;
            transition: 0.5s;
        }

        .layer.active {
            opacity: 1;
            pointer-events: auto;
        }

        .neural-zone {
            fill: rgba(188, 19, 254, 0.1);
            stroke: var(--accent);
            stroke-width: 1;
            stroke-dasharray: 4;
        }

        .sniper-entry {
            fill: rgba(0, 242, 255, 0.2);
            stroke: var(--accent-cyan);
            stroke-width: 2;
        }

        .liquidity-gap {
            fill: rgba(0, 242, 255, 0.05);
            stroke: var(--accent-cyan);
            stroke-width: 1;
            stroke-dasharray: 2;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo"><i class="fas fa-microchip"></i> KARTOFFEL <span>V2.3 PRECISION</span></div>
        <div class="control-hub">
            <select class="asset-selector" id="asset-switcher">
                <option value="CAPITALCOM:GOLD">GOLD (Capital.com)</option>
                <option value="BINANCE:BTCUSDT" selected>BITCOIN (Binance)</option>
                <option value="CAPITALCOM:EURUSD">EUR/USD (Capital.com)</option>
                <option value="CAPITALCOM:GBPUSD">GBP/USD (Capital.com)</option>
            </select>
            <div class="tf-btn-group">
                <button class="tf-btn" id="tf-15" onclick="setTF('15')">15M</button>
                <button class="tf-btn" id="tf-60" onclick="setTF('60')">1H</button>
                <button class="tf-btn active" id="tf-240" onclick="setTF('240')">4H</button>
            </div>
            <a href="index.html" class="nav-btn" style="margin-left: 20px;">V1 Hub</a>
        </div>
        <div style="font-size: 0.75rem; color: var(--accent-cyan); font-weight: 700;">
            <i class="fas fa-circle pulse" style="font-size: 0.5rem; margin-right: 6px;"></i> NEURAL SYNC
        </div>
    </header>

    <main>
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="label-tiny">Precise Brainstorm</span>
                <div class="council-title">AI Council Hub</div>
            </div>
            <div id="council-feed"></div>
            <div class="scout-hub">
                <span class="label-tiny">Strategy Scout (WWW)</span>
                <div id="scout-list"></div>
            </div>
        </aside>

        <section class="map-section">
            <svg class="map-overlay" id="neural-overlay" viewBox="0 0 800 600" preserveAspectRatio="none">
                <!-- Group IDs for Algorithmic Rendering -->
                <g id="layer-zones" class="layer"></g>
                <g id="layer-sniper" class="layer"></g>
                <g id="layer-gaps" class="layer"></g>
            </svg>
            <div id="tv-widget-container"></div>

            <div class="map-controls">
                <button class="map-btn" id="btn-zones" onclick="toggleLayer('zones')"><i
                        class="fas fa-draw-polygon"></i> Neural Zones</button>
                <button class="map-btn" id="btn-sniper" onclick="toggleLayer('sniper')"><i
                        class="fas fa-crosshairs"></i> Sniper Entry</button>
                <button class="map-btn" id="btn-gaps" onclick="toggleLayer('gaps')"><i class="fas fa-ghost"></i>
                    Liquidity Gaps</button>
            </div>
        </section>

        <aside class="path-section">
            <div class="compounding-card">
                <div class="goal-label">Precision Pathways</div>
                <div class="goal-amount" id="balance-display">$10,000.00</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>

            <!-- Neural Intelligence Hub -->
            <div class="intel-card">
                <span class="label-tiny">Trade Strategy Analysis</span>
                <div class="levels-grid">
                    <div class="level-item">
                        <div class="level-label">Entry</div>
                        <div class="level-val" id="intel-entry">0.00</div>
                    </div>
                    <div class="level-item">
                        <div class="level-label">T-Profit</div>
                        <div class="level-val tp-val" id="intel-tp">0.00</div>
                    </div>
                    <div class="level-item">
                        <div class="level-label">S-Loss</div>
                        <div class="level-val sl-val" id="intel-sl">0.00</div>
                    </div>
                </div>
            </div>

            <div class="stat-grid">
                <div class="stat-item">
                    <div class="label-tiny">Next Lot</div>
                    <div class="stat-val" id="next-lot">0.10</div>
                </div>
                <div class="stat-item">
                    <div class="label-tiny">Ref. Price</div>
                    <div class="stat-val" id="sync-price">0.00</div>
                </div>
            </div>

            <div style="flex: 1;"></div>
            <button class="btn-launch" onclick="launchSimulation()">ACTIVATE $1M CODE</button>
        </aside>
    </main>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const state = { symbol: 'BINANCE:BTCUSDT', interval: '240', price: 0 };
        const activeLayers = { zones: false, sniper: false, gaps: false };

        function initTV() {
            new TradingView.widget({
                "autosize": true, "symbol": state.symbol, "interval": state.interval,
                "theme": "dark", "style": "1", "container_id": "tv-widget-container"
            });
            renderNeuralData(); // Re-calculate zones on every widget init
        }

        document.getElementById('asset-switcher').addEventListener('change', (e) => {
            state.symbol = e.target.value;
            initTV();
            syncPrice();
        });

        function setTF(tf) {
            state.interval = tf;
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tf-${tf}`).classList.add('active');
            initTV();
        }

        async function syncPrice() {
            const sym = state.symbol.includes(':') ? state.symbol.split(':')[1] : state.symbol;
            const fetchSym = sym === 'GOLD' ? 'PAXGUSDT' : sym;
            try {
                const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${fetchSym}`);
                const data = await res.json();
                state.price = parseFloat(data.price) || 0;
            } catch (e) {
                state.price = state.symbol.includes('GOLD') ? 2185.70 : 1.0855;
            }
            document.getElementById('sync-price').innerText = state.price.toLocaleString();
            updateLevels();
            renderNeuralData();
        }

        function updateLevels() {
            const sym = state.symbol.split(':')[1] || state.symbol;
            let volatilityBase = 0.01;

            // Asset Specific Pip/Point Math
            if (sym.includes('BTC')) volatilityBase = (state.interval === '15' ? 200 : state.interval === '60' ? 800 : 2500);
            else if (sym.includes('GOLD')) volatilityBase = (state.interval === '15' ? 2 : state.interval === '60' ? 8 : 25);
            else volatilityBase = (state.interval === '15' ? 0.0010 : state.interval === '60' ? 0.0040 : 0.0120);

            const entry = state.price;
            const tp = entry + (volatilityBase * 2.5);
            const sl = entry - volatilityBase;

            document.getElementById('intel-entry').innerText = entry.toFixed(entry < 10 ? 4 : 2);
            document.getElementById('intel-tp').innerText = tp.toFixed(entry < 10 ? 4 : 2);
            document.getElementById('intel-sl').innerText = sl.toFixed(entry < 10 ? 4 : 2);
        }

        function renderNeuralData() {
            // Algorithmic Zone Generator
            const zones = document.getElementById('layer-zones');
            const sniper = document.getElementById('layer-sniper');
            const gaps = document.getElementById('layer-gaps');

            const seed = state.symbol.length + parseInt(state.interval);
            const random = (s) => Math.abs(Math.sin(s) * 1000 % 1);

            // Clear current
            zones.innerHTML = ''; sniper.innerHTML = ''; gaps.innerHTML = '';

            // Generate Zones
            for (let i = 0; i < 2; i++) {
                const y = 100 + (random(seed + i) * 400);
                zones.innerHTML += `<rect x="50" y="${y}" width="700" height="${20 + random(seed + i) * 40}" class="neural-zone" />`;
            }

            // Generate Sniper
            const sy = 150 + (random(seed + 9) * 300);
            sniper.innerHTML = `<circle cx="400" cy="${sy}" r="15" class="sniper-entry" />`;

            // Generate Gaps
            for (let i = 0; i < 3; i++) {
                const gy = 80 + (random(seed + 15 + i) * 450);
                gaps.innerHTML += `<rect x="50" y="${gy}" width="700" height="2" class="liquidity-gap" />`;
            }
        }

        function toggleLayer(layer) {
            activeLayers[layer] = !activeLayers[layer];
            document.getElementById(`layer-${layer}`).classList.toggle('active', activeLayers[layer]);
            document.getElementById(`btn-${layer}`).classList.toggle('active', activeLayers[layer]);
        }

        const council = document.getElementById('council-feed');
        const agents = [
            { name: 'Trend Voyager', class: 'ai-trend', icon: 'fa-compass' },
            { name: 'Liquidity Scout', class: 'ai-liquidity', icon: 'fa-water' },
            { name: 'Risk Warden', class: 'ai-risk', icon: 'fa-shield-halved' }
        ];

        function addCouncilMsg() {
            const agent = agents[Math.floor(Math.random() * agents.length)];
            const sym = state.symbol.split(':')[1] || state.symbol;
            const messages = [
                `Refining ${sym} zones for the ${state.interval}m timeframe.`,
                `Liquidity gaps detected around ${state.price}. High gravity zone.`,
                `Targeting TP at ${document.getElementById('intel-tp').innerText}. Bias: BULLISH.`,
                `Risk Warden check: SL is algorithmic. Precision lock at local low.`,
                `Institutional bias on ${sym} optimized for ${state.interval}m volatility.`,
                `Sniper Entry confirmed on the map. Waiting for price to hit target.`
            ];
            const div = document.createElement('div');
            div.className = 'ai-msg';
            div.innerHTML = `<span class="ai-name ${agent.class}"><i class="fas ${agent.icon}"></i> ${agent.name}</span>${messages[Math.floor(Math.random() * messages.length)]}`;
            council.prepend(div);
            if (council.children.length > 10) council.removeChild(council.lastChild);
        }

        let balance = 10000;
        function launchSimulation() {
            const interval = setInterval(() => {
                balance += Math.random() * 8000;
                document.getElementById('balance-display').innerText = "$" + balance.toLocaleString(undefined, { minimumFractionDigits: 2 });
                const progress = (balance / 1000000) * 100;
                document.getElementById('progress-fill').style.width = Math.min(progress, 100) + '%';
                document.getElementById('next-lot').innerText = (0.1 + (balance / 10000) * 0.1).toFixed(2);
                if (balance >= 1000000) clearInterval(interval);
            }, 50);
        }

        window.onload = () => {
            initTV();
            syncPrice();
            setInterval(addCouncilMsg, 4000);
            setInterval(syncPrice, 5000);
        };
    </script>
</body>

</html>
